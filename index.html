  <label style="font-family:Inter,sans-serif;font-size:11px;color:rgba(255,255,255,0.6);display:block;margin-bottom:6px">Arka Plan</label>

  <input type="color" id="tw-dark" value="#1C1C1E" style="width:100%;height:32px;border:none;cursor:pointer;background:none;margin-bottom:20px"/>
  <button id="tw-reset" style="width:100%;background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);font-family:Montserrat,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px;cursor:pointer">Sıfırla</button>

<script type="text/babel" src="project/components/MobileTopBar.jsx"></script>
<script type="text/babel" src="project/components/NavBar.jsx"></script>
<script type="text/babel" src="project/components/HeroSection.jsx"></script>
<script type="text/babel" src="project/components/StatsBar.jsx"></script>

<script type="text/babel" src="project/components/ServicesSection.jsx"></script>
<script type="text/babel" src="project/components/CatalogSection.jsx"></script>
<script type="text/babel" src="project/components/GallerySection.jsx"></script>
<script type="text/babel" src="project/components/AboutSection.jsx"></script>
<script type="text/babel" src="project/components/TestimonialsSection.jsx"></script>
<script type="text/babel" src="project/components/ContactSection.jsx"></script>
<script type="text/babel" src="project/components/FooterSection.jsx"></script>
<script type="text/babel" src="project/components/FloatingElements.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#fddea5",
  "bgColor": "#d8cec2",
  "primaryColor": "#1c1c1e"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('at_tweaks') || '{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });

  React.useEffect(() => {
    localStorage.setItem('at_tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  // Tweaks panel wiring
  React.useEffect(() => {
    const panel = document.getElementById('tweaks-panel');
    const accentEl = document.getElementById('tw-accent');
    const bgEl = document.getElementById('tw-bg');
    const darkEl = document.getElementById('tw-dark');
    const resetEl = document.getElementById('tw-reset');

    if (!panel) return;
    accentEl.value = tweaks.accentColor;
    bgEl.value = tweaks.bgColor;
    darkEl.value = tweaks.primaryColor;

    const onChange = () => {
      const newT = { accentColor: accentEl.value, bgColor: bgEl.value, primaryColor: darkEl.value };
      setTweaks(newT);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: newT }, '*');
    };

    accentEl.addEventListener('input', onChange);
    bgEl.addEventListener('input', onChange);
    darkEl.addEventListener('input', onChange);
    resetEl.addEventListener('click', () => {
      setTweaks(TWEAK_DEFAULTS);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: TWEAK_DEFAULTS }, '*');
    });

    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') panel.classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('open');
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    return () => {
      accentEl.removeEventListener('input', onChange);
      bgEl.removeEventListener('input', onChange);
      darkEl.removeEventListener('input', onChange);
      window.removeEventListener('message', onMsg);
    };
  }, []);

  // Reveal on scroll
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  // GA4 Scroll depth tracking
  React.useEffect(() => {
    let tracked = new Set();
    const handleScroll = () => {
      const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
      const scrollPercent = scrollHeight > 0 ? Math.round((window.scrollY / scrollHeight) * 100) : 0;

      if (scrollPercent >= 25 && !tracked.has(25)) {
        tracked.add(25);
        if (window.gtag) window.gtag('event', 'scroll', { event_category: 'engagement', scroll_depth: 25 });
      }
      if (scrollPercent >= 50 && !tracked.has(50)) {
        tracked.add(50);
        if (window.gtag) window.gtag('event', 'scroll', { event_category: 'engagement', scroll_depth: 50 });
      }
      if (scrollPercent >= 75 && !tracked.has(75)) {
        tracked.add(75);
        if (window.gtag) window.gtag('event', 'scroll', { event_category: 'engagement', scroll_depth: 75 });
      }
      if (scrollPercent >= 90 && !tracked.has(90)) {
        tracked.add(90);
        if (window.gtag) window.gtag('event', 'scroll', { event_category: 'engagement', scroll_depth: 90 });
      }
    };

    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  return (
    <div style={{ background: tweaks.bgColor }}>
      <MobileTopBar tweaks={tweaks} />
      <NavBar tweaks={tweaks} />
      <HeroSection tweaks={tweaks} />
      <StatsBar tweaks={tweaks} />
      <ProjectSlider tweaks={tweaks} />
      <ServicesSection tweaks={tweaks} />
      <CatalogSection tweaks={tweaks} />
      <GallerySection tweaks={tweaks} />
      <AboutSection tweaks={tweaks} />
      <TestimonialsSection tweaks={tweaks} />
      <ContactSection tweaks={tweaks} />
      <FooterSection tweaks={tweaks} />
      <FloatingElements tweaks={tweaks} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
